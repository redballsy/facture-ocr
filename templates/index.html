<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESFI GROUP - Extracteur Factures OCR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1B3A5C 0%, #2E5A88 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1B3A5C 0%, #2E5A88 100%);
            color: white;
            padding: 30px 40px;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: bold;
        }
        .logo-text span { color: #D4AF37; }
        .status-badge {
            background: rgba(212,175,55,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #D4AF37;
        }
        .content { padding: 40px; }
        .drop-zone {
            border: 3px dashed #DEE2E6;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #F8F9FA;
            margin-bottom: 30px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #D4AF37;
            background: #FFF8F0;
        }
        .btn-upload {
            background: linear-gradient(135deg, #D4AF37 0%, #C5A028 100%);
            color: #1B3A5C;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .progress-container { margin: 20px 0; display: none; }
        .progress-bar {
            background: #DEE2E6;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #28A745, #D4AF37);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .results-table th, .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #DEE2E6;
        }
        .results-table th {
            background: #1B3A5C;
            color: white;
        }
        .btn-download {
            background: linear-gradient(135deg, #28A745 0%, #218838 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .footer {
            background: #1B3A5C;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: #F8F9FA;
            border-radius: 10px;
        }
        .stat-card {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #1B3A5C;
        }
        .badge-success { color: #28A745; font-weight: bold; }
        .badge-error { color: #DC3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="logo-text">GESFI<span>GROUP</span></div>
                <div class="status-badge">✅ Tesseract actif</div>
            </div>
        </div>
        <div class="content">
            <div class="drop-zone" id="dropZone">
                <div style="font-size:48px;margin-bottom:15px;">📦</div>
                <div>Glissez-déposez jusqu'à 100 factures ici</div>
                <div style="font-size:11px;color:#999;margin-top:5px;">Formats: JPG, PNG, BMP, TIFF, WEBP, PDF</div>
                <input type="file" id="fileInput" multiple accept="image/*,application/pdf" style="display:none;">
                <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Sélectionner des fichiers</button>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <p id="progressText" style="margin-top:10px;text-align:center;"></p>
            </div>
            <div id="resultsSection" style="display:none;">
                <div class="stats" id="stats"></div>
                <table class="results-table">
                    <thead><tr><th>#</th><th>Fichier</th><th>Type</th><th>Statut</th></tr></thead>
                    <tbody id="resultsBody"></tbody>
                </table>
                <button class="btn-download" id="downloadBtn">📥 Télécharger Excel (une feuille par facture)</button>
            </div>
        </div>
        <div class="footer">© 2026 GESFI GROUP - Extraction intelligente Vente/Achat</div>
    </div>
    <script>
        let selectedFiles = [], resultsData = null;
        const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            addFiles(Array.from(e.dataTransfer.files));
        });
        fileInput.addEventListener('change', (e) => addFiles(Array.from(e.target.files)));
        
        function addFiles(files) {
            const validExts = ['jpg','jpeg','png','bmp','tiff','tif','webp','gif','pdf'];
            const validFiles = files.filter(f => validExts.includes(f.name.split('.').pop().toLowerCase())).slice(0, 100);
            if (validFiles.length) { selectedFiles = validFiles; processFiles(); }
            else if (files.length) alert('Formats supportés: JPG, PNG, BMP, TIFF, WEBP, PDF');
        }
        
        async function processFiles() {
            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('fichiers', f));
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            let p = 0;
            const interval = setInterval(() => { if (p < 90) { p += 10; document.getElementById('progressFill').style.width = p+'%'; } }, 300);
            try {
                const res = await fetch('/analyser_batch', { method: 'POST', body: formData });
                const data = await res.json();
                clearInterval(interval);
                document.getElementById('progressFill').style.width = '100%';
                if (res.ok) { resultsData = data; displayResults(data); }
                else alert('Erreur: ' + (data.erreur || 'Inconnue'));
            } catch(e) { clearInterval(interval); alert('Erreur: ' + e.message); }
        }
        
        function displayResults(data) {
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${data.total}</div><div>Total</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#28A745">${data.succes}</div><div>Succès</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#DC3545">${data.erreurs}</div><div>Erreurs</div></div>
            `;
            document.getElementById('resultsBody').innerHTML = data.resultats.map((r,i)=>`
                <tr><td>${i+1}</td><td>${r.nom}</td><td>${r.donnees?.type||'-'}</td>
                <td class="${r.succes?'badge-success':'badge-error'}">${r.succes?'✅ Succès':'❌ '+ (r.erreur||'Erreur')}</td></tr>
            `).join('');
        }
        
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            if (!resultsData) return;
            const res = await fetch('/telecharger_excel', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({resultats: resultsData.resultats}) });
            if (res.ok) { const blob = await res.blob(); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `factures_${Date.now()}.xlsx`; a.click(); URL.revokeObjectURL(url); }
        });
    </script>
</body>
</html>
